<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savat – Mohinur Print</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="header">
  <div class="container header-inner">
    <a href="index.html" class="logo"><span class="logo-icon">📚</span><div><span class="logo-name">Mohinur Print</span><span class="logo-sub">Kitob do'koni</span></div></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Bosh sahifa</a><a href="catalog.html">Katalog</a><a href="about.html">Haqimizda</a><a href="contact.html">Aloqa</a>
    </nav>
    <div class="header-actions">
      <a href="wishlist.html" class="icon-btn">♡ <span id="wishCount">0</span></a>
      <a href="cart.html" class="icon-btn cart-btn active">🛒 <span id="cartCount">0</span></a>
      <button class="hamburger" onclick="toggleMenu()">☰</button>
    </div>
  </div>
</header>

<div class="page-banner"><div class="container"><h1>🛒 Xarid savati</h1></div></div>

<div class="container cart-layout" style="margin-top:2rem;margin-bottom:4rem">
  <div id="cartContent"></div>
</div>

<footer>
  <div class="container footer-inner">
    <div class="footer-col"><h4>📚 Mohinur Print</h4></div>
    <div class="footer-col"><h4>Sahifalar</h4><a href="index.html">Bosh sahifa</a><a href="catalog.html">Katalog</a></div>
    <div class="footer-col"><h4>Bog'lanish</h4><p>📞 +998 73 XXX-XX-XX</p></div>
  </div>
  <div class="footer-bottom"><p>© 2026 Mohinur Print MCHJ.</p></div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const el = document.getElementById('cartContent');
  if(!cart.length) {
    el.innerHTML = `<div class="empty-state">
      <p style="font-size:3rem">🛒</p>
      <h2>Savat bo'sh</h2>
      <p>Hali hech narsa qo'shilmagan</p>
      <a href="catalog.html" class="btn-primary" style="display:inline-block;margin-top:1rem">Kitoblarga o'tish</a>
    </div>`;
    return;
  }
  const total = cart.reduce((s,b)=>s+b.price*b.qty,0);
  const delivery = total >= 100000 ? 0 : 15000;
  el.innerHTML = `
    <div class="cart-grid">
      <div class="cart-items">
        ${cart.map(b=>`
        <div class="cart-item" id="ci_${b.id}">
          <a href="book.html?id=${b.id}">
            <div class="cart-item-img" style="background:${b.color||'#4a90d9'}">${b.emoji||'📖'}</div>
          </a>
          <div class="cart-item-info">
            <a href="book.html?id=${b.id}"><h4>${b.title}</h4></a>
            <p>${b.author}</p>
            <span class="cart-price">${formatPrice(b.price)} so'm</span>
          </div>
          <div class="cart-item-ctrl">
            <div class="qty-ctrl">
              <button onclick="updateQty(${b.id},-1)">−</button>
              <span>${b.qty}</span>
              <button onclick="updateQty(${b.id},1)">+</button>
            </div>
            <span class="cart-subtotal">${formatPrice(b.price*b.qty)} so'm</span>
            <button class="remove-btn" onclick="removeItem(${b.id})">🗑️</button>
          </div>
        </div>`).join('')}
      </div>
      <div class="cart-summary">
        <h3>Buyurtma xulosasi</h3>
        <div class="summary-row"><span>Kitoblar (${cart.reduce((s,b)=>s+b.qty,0)} ta)</span><span>${formatPrice(total)} so'm</span></div>
        <div class="summary-row"><span>Yetkazib berish</span><span>${delivery===0?'<span style="color:green">Bepul</span>':formatPrice(delivery)+' so\'m'}</span></div>
        ${delivery>0?`<p class="delivery-hint">💡 ${formatPrice(100000-total)} so'mlik kitob qo'shing – yetkazib berish bepul bo'ladi!</p>`:''}
        <div class="summary-total"><span>Jami</span><span>${formatPrice(total+delivery)} so'm</span></div>
        <button class="btn-primary w100" onclick="showCheckout()">Buyurtma berish →</button>
        <a href="catalog.html" class="btn-outline w100" style="display:block;text-align:center;margin-top:.5rem">Xaridni davom ettirish</a>
      </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkoutModal" class="modal" style="display:none">
      <div class="modal-box">
        <button class="modal-close" onclick="closeCheckout()">✕</button>
        <h2>📦 Buyurtmani rasmiylashtirish</h2>
        <div class="checkout-steps">
          <div class="step active" id="step1">
            <h3>1. Shaxsiy ma'lumotlar</h3>
            <input type="text" id="cName" placeholder="To'liq ism *" required>
            <input type="tel" id="cPhone" placeholder="Telefon: +998 XX XXX-XX-XX *" required>
            <input type="email" id="cEmail" placeholder="Email (ixtiyoriy)">
            <h3 style="margin-top:1rem">2. Yetkazib berish manzili</h3>
            <select id="cCity">
              <option value="fergana">Farg'ona shahari</option>
              <option value="fergana_reg">Farg'ona viloyati</option>
              <option value="toshkent">Toshkent</option>
              <option value="other">Boshqa viloyat</option>
            </select>
            <input type="text" id="cAddress" placeholder="Ko'cha, uy raqami *" required>
            <h3 style="margin-top:1rem">3. To'lov usuli</h3>
            <div class="payment-opts">
              <label class="pay-opt"><input type="radio" name="pay" value="click" checked> <img src="https://click.uz/favicon.ico" onerror="this.style.display='none'" style="height:20px"> Click</label>
              <label class="pay-opt"><input type="radio" name="pay" value="payme"> 💳 Payme</label>
              <label class="pay-opt"><input type="radio" name="pay" value="cash"> 💵 Naqd pul</label>
            </div>
            <div class="summary-total" style="margin-top:1rem"><span>Jami to'lov:</span><span>${formatPrice(total+delivery)} so'm</span></div>
            <button class="btn-primary w100" onclick="placeOrder()">✅ Buyurtmani tasdiqlash</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function updateQty(id, d) {
  let cart = getCart();
  const item = cart.find(x=>x.id===id);
  if(!item) return;
  item.qty = Math.max(1, item.qty+d);
  saveCart(cart);
  updateCounts();
  renderCart();
}

function removeItem(id) {
  let cart = getCart().filter(x=>x.id!==id);
  saveCart(cart);
  updateCounts();
  renderCart();
}

function showCheckout() {
  document.getElementById('checkoutModal').style.display='flex';
}
function closeCheckout() {
  document.getElementById('checkoutModal').style.display='none';
}

function placeOrder() {
  const name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  const addr = document.getElementById('cAddress').value.trim();
  if(!name||!phone||!addr) { alert('Iltimos, barcha majburiy maydonlarni to\'ldiring!'); return; }

  const cart = getCart();
  const pay = document.querySelector('input[name="pay"]:checked').value;
  const city = document.getElementById('cCity').value;
  const total = cart.reduce((s,b)=>s+b.price*b.qty,0);
  const delivery = total>=100000?0:15000;

  // Save order
  const orders = JSON.parse(localStorage.getItem('orders')||'[]');
  const orderNum = 'MP-' + Date.now().toString().slice(-6);
  orders.push({
    num: orderNum, name, phone, addr, city, pay,
    items: cart, total: total+delivery,
    date: new Date().toLocaleDateString('uz-UZ'),
    status: 'Qabul qilindi'
  });
  localStorage.setItem('orders', JSON.stringify(orders));
  saveCart([]);
  updateCounts();

  closeCheckout();
  document.getElementById('cartContent').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✅</div>
      <h2>Buyurtma muvaffaqiyatli qabul qilindi!</h2>
      <p>Buyurtma raqami: <strong>${orderNum}</strong></p>
      <p>Hurmatli <strong>${name}</strong>, buyurtmangiz qabul qilindi.</p>
      <p>📞 Tez orada operator siz bilan bog'lanadi.</p>
      <p>📦 Yetkazib berish muddati: ${city==='fergana'?'1-2 ish kuni':'3-5 ish kuni'}</p>
      <p>💳 To'lov usuli: ${pay==='click'?'Click':pay==='payme'?'Payme':'Naqd pul'}</p>
      <a href="index.html" class="btn-primary" style="display:inline-block;margin-top:1.5rem">Bosh sahifaga qaytish</a>
    </div>`;
}

renderCart();
updateCounts();
</script>
</body>
</html>
